<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DateTrack — Your Date Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #f0c56a;
      --accent2: #e87c5a;
      --text: #f0ede8;
      --muted: #7a7a8a;
      --danger: #e05454;
      --green: #5ac87d;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }

    /* Header */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 48px;
      gap: 20px;
      flex-wrap: wrap;
    }
    .logo { display: flex; flex-direction: column; gap: 4px; }
    .logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }
    .logo h1 span { color: var(--accent); font-style: italic; }
    .logo p { color: var(--muted); font-size: 0.88rem; font-weight: 300; letter-spacing: 0.5px; }

    .today-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 18px;
      text-align: right;
    }
    .today-badge .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .today-badge .date-str { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--accent); margin-top: 2px; }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card .num {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: var(--accent);
      line-height: 1;
    }
    .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.8px; }

    /* Add form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 32px;
    }
    .form-card h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 20px; color: var(--text); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 12px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,197,106,0.12);
    }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 70px; }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
    .color-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: var(--text); transform: scale(1.1); }

    .btn-add {
      grid-column: 1 / -1;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-add:hover { background: #f5d280; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* Filter & search */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input { flex: 1; min-width: 160px; }
    .toolbar select { width: auto; min-width: 130px; }
    .sort-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s;
    }
    .sort-btn:hover { border-color: var(--accent); }

    /* Events list */
    .section-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 16px; }
    .events-list { display: flex; flex-direction: column; gap: 12px; }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      transition: border-color 0.2s, transform 0.2s;
      animation: slideIn 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .event-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--event-color, var(--accent));
      border-radius: 0 2px 2px 0;
    }
    .event-card:hover { border-color: var(--event-color, var(--accent)); transform: translateX(3px); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .event-date-box {
      text-align: center;
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 60px;
      border: 1px solid var(--border);
    }
    .event-date-box .day { font-family: 'DM Serif Display', serif; font-size: 1.7rem; color: var(--event-color, var(--accent)); line-height: 1; }
    .event-date-box .month { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

    .event-info { flex: 1; }
    .event-info .title { font-weight: 600; font-size: 1rem; color: var(--text); margin-bottom: 4px; }
    .event-info .meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .event-info .cat {
      font-size: 0.72rem;
      padding: 2px 9px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .event-info .note { font-size: 0.82rem; color: var(--muted); margin-top: 5px; }

    .event-countdown {
      text-align: right;
      min-width: 80px;
    }
    .countdown-num {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      line-height: 1;
    }
    .countdown-num.past { color: var(--muted); }
    .countdown-num.today { color: var(--green); }
    .countdown-sub { font-size: 0.7rem; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    .btn-del {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.9rem;
      transition: color 0.15s, border-color 0.15s;
      align-self: flex-start;
    }
    .btn-del:hover { color: var(--danger); border-color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.92rem; }

    /* UPCOMING section divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 32px 0 20px;
    }
    .divider span { font-family: 'DM Serif Display', serif; font-size: 1.2rem; white-space: nowrap; }
    .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Responsive */
    @media (max-width: 580px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .event-card { grid-template-columns: auto 1fr; }
      .event-countdown { display: none; }
      .stat-card .num { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <h1>Date<span>Track</span></h1>
      <p>Your personal date & event manager</p>
    </div>
    <div class="today-badge">
      <div class="label">Today</div>
      <div class="date-str" id="todayStr"></div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="lbl">Total Events</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statUpcoming">0</div>
      <div class="lbl">Upcoming</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statThisMonth">0</div>
      <div class="lbl">This Month</div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="form-card">
    <h2>+ Add New Event</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Event Name *</label>
        <input type="text" id="inputName" placeholder="Birthday, Meeting, Anniversary…" />
      </div>
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="inputDate" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="inputCat">
          <option value="personal">Personal</option>
          <option value="work">Work</option>
          <option value="birthday">Birthday</option>
          <option value="anniversary">Anniversary</option>
          <option value="holiday">Holiday</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Color Tag</label>
        <div class="color-row" id="colorPicker"></div>
      </div>
      <div class="form-group full">
        <label>Note (optional)</label>
        <textarea id="inputNote" placeholder="Any details…"></textarea>
      </div>
      <button class="btn-add" onclick="addEvent()">Add Event</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍  Search events…" oninput="renderAll()" />
    <select id="filterCat" onchange="renderAll()">
      <option value="">All Categories</option>
      <option value="personal">Personal</option>
      <option value="work">Work</option>
      <option value="birthday">Birthday</option>
      <option value="anniversary">Anniversary</option>
      <option value="holiday">Holiday</option>
      <option value="other">Other</option>
    </select>
    <button class="sort-btn" onclick="toggleSort()">⇅ <span id="sortLabel">Soonest First</span></button>
  </div>

  <div class="section-title">Your Events</div>
  <div class="events-list" id="eventsList"></div>

</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────
  const COLORS = ['#f0c56a','#e87c5a','#5ac87d','#6ab4f0','#c46af0','#f06a9b','#a0d9b0','#f0a06a'];
  let selectedColor = COLORS[0];
  let events = JSON.parse(localStorage.getItem('datetrack_events') || '[]');
  let sortAsc = true; // true = soonest first

  // ─── INIT ─────────────────────────────────────────────
  function init() {
    // Today badge
    const today = new Date();
    document.getElementById('todayStr').textContent = today.toLocaleDateString('en-US', {
      weekday: 'short', month: 'long', day: 'numeric', year: 'numeric'
    });

    // Default date input to today
    document.getElementById('inputDate').value = toISO(today);

    // Color picker
    const cp = document.getElementById('colorPicker');
    COLORS.forEach(c => {
      const d = document.createElement('div');
      d.className = 'color-dot' + (c === selectedColor ? ' active' : '');
      d.style.background = c;
      d.onclick = () => {
        selectedColor = c;
        document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('active'));
        d.classList.add('active');
      };
      cp.appendChild(d);
    });

    renderAll();
  }

  // ─── HELPERS ──────────────────────────────────────────
  function toISO(d) {
    return d.toISOString().split('T')[0];
  }

  function daysDiff(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function save() {
    localStorage.setItem('datetrack_events', JSON.stringify(events));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  // ─── ADD ──────────────────────────────────────────────
  function addEvent() {
    const name = document.getElementById('inputName').value.trim();
    const date = document.getElementById('inputDate').value;
    if (!name || !date) { alert('Please fill in event name and date.'); return; }

    events.push({
      id: uid(),
      name,
      date,
      category: document.getElementById('inputCat').value,
      color: selectedColor,
      note: document.getElementById('inputNote').value.trim(),
      created: Date.now()
    });

    save();
    document.getElementById('inputName').value = '';
    document.getElementById('inputNote').value = '';
    renderAll();
  }

  // ─── DELETE ───────────────────────────────────────────
  function deleteEvent(id) {
    events = events.filter(e => e.id !== id);
    save();
    renderAll();
  }

  // ─── SORT TOGGLE ──────────────────────────────────────
  function toggleSort() {
    sortAsc = !sortAsc;
    document.getElementById('sortLabel').textContent = sortAsc ? 'Soonest First' : 'Latest First';
    renderAll();
  }

  // ─── RENDER ───────────────────────────────────────────
  function renderAll() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filterCat = document.getElementById('filterCat').value;

    let filtered = events.filter(e => {
      const matchSearch = e.name.toLowerCase().includes(search) || (e.note||'').toLowerCase().includes(search);
      const matchCat = !filterCat || e.category === filterCat;
      return matchSearch && matchCat;
    });

    filtered.sort((a, b) => {
      const diff = new Date(a.date) - new Date(b.date);
      return sortAsc ? diff : -diff;
    });

    // Stats
    const today = toISO(new Date());
    const thisMonthStr = today.slice(0,7);
    document.getElementById('statTotal').textContent = events.length;
    document.getElementById('statUpcoming').textContent = events.filter(e => e.date >= today).length;
    document.getElementById('statThisMonth').textContent = events.filter(e => e.date.startsWith(thisMonthStr)).length;

    const list = document.getElementById('eventsList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>No events found. Add your first event above!</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(e => {
      const d = new Date(e.date + 'T00:00:00');
      const day = d.getDate();
      const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
      const diff = daysDiff(e.date);
      let cdClass = diff > 0 ? '' : diff === 0 ? 'today' : 'past';
      let cdNum = Math.abs(diff);
      let cdSub = diff > 0 ? 'days away' : diff === 0 ? '🎉 Today!' : 'days ago';

      return `
        <div class="event-card" style="--event-color: ${e.color}">
          <div class="event-date-box">
            <div class="day">${day}</div>
            <div class="month">${month}</div>
          </div>
          <div class="event-info">
            <div class="title">${escHtml(e.name)}</div>
            <div class="meta">
              <span class="cat">${e.category}</span>
              <span style="font-size:0.78rem;color:var(--muted)">${d.getFullYear()}</span>
            </div>
            ${e.note ? `<div class="note">${escHtml(e.note)}</div>` : ''}
          </div>
          <div class="event-countdown">
            <div class="countdown-num ${cdClass}">${diff === 0 ? '🎊' : cdNum}</div>
            <div class="countdown-sub">${cdSub}</div>
          </div>
          <button class="btn-del" onclick="deleteEvent('${e.id}')" title="Delete">✕</button>
        </div>
      `;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // allow pressing Enter in name field to submit
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('inputName').addEventListener('keydown', e => {
      if (e.key === 'Enter') addEvent();
    });
  });

  init();
</script>
</body>
</html>
